# ==================== 扩散模型参数 ====================
# 根据数据集规模调整diffusion_steps：
#   小数据集(ml-100k, baby, beauty): diffusion_steps=32
#   中等数据集(toys, sports): diffusion_steps=32
#   大数据集(yelp): diffusion_steps=64 (可选，提升性能但增加训练时间)
schedule_sampler_name: uniform  # 扩散时间步t的采样方式
diffusion_steps: 32  # 扩散步数（yelp可尝试64）
noise_schedule: trunc_lin  # 噪声调度方式
beta_a: 0.3  # beta调度参数a
beta_b: 10  # beta调度参数b
dif_objective: pred_x0  # 扩散损失目标: 'pred_noise', 'pred_x0', 'pred_v'
diffusion_loss_type: cosine  # 扩散重建损失类型: 'mse' (原始MSE损失) 或 'cosine' (余弦误差损失，Phase 1改进)
parallel_ag: true  # 是否以逐token自回归方式训练
rescale_timesteps: true  # 是否重新缩放时间步
# 根据改进建议调整lambda_uncertainty：
#   原始值: 0.001 (可能过小)
#   推荐值: 0.01 (小数据集) 或 0.1 (大数据集)
lambda_uncertainty: 0.01  # 不确定性权重（从0.001提升到0.01，根据改进建议）
cfg_scale: 1  # 分类器引导缩放因子
geodesic: false  # 是否使用测地线扩散（仅在adrec中可用）
independent: true  # 是否使用独立扩散（仅在adrec中可用）

# ==================== 评估和监控参数 ====================
metric_ks:
  - 5
  - 10
  - 20  # Metric@k中的k值列表
eval_interval: 5  # 评估间隔（每多少个epoch评估一次）
epoch_wo_val: 0  # 前多少个epoch不进行评估
patience: 4  # 早停等待的epoch数
diversity_measure: false  # 是否测量推荐结果的多样性
epoch_time_avg: false  # 是否计算一个epoch训练的平均时间

# ==================== 其他配置 ====================
split_onebyone: false  # 是否逐个分割序列
pretrained: false  # 是否使用预训练模型
freeze_emb: false  # 是否冻结嵌入层
description: _  # 模型简要介绍
