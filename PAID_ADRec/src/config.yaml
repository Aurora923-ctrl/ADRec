# ==================== 数据集和基础配置 ====================
# 数据集规模参考：
#   ml-100k: 1008 (最小)   - 小数据集
#   baby: 4731 (小)        - 小数据集
#   beauty: 6086 (小-中)   - 小-中数据集
#   toys: 7309 (中)        - 中等数据集
#   sports: 12301 (中-大)  - 中-大数据集
#   yelp: 64669 (最大)     - 大数据集
#
# 当前使用的数据集（请根据需要修改）：
dataset: ml-100k  # 数据集名称:  ml-100k,baby, beauty, toys,sports,  yelp
log_file: logs/  # 日志文件目录路径
random_seed: 2025  # 随机种子
device: cuda:0  # 设备选择: 'cpu', 'cuda:0', 'cuda:1'

# ==================== 模型架构参数 ====================
# 根据数据集规模调整：
#   小数据集(ml-100k, baby, beauty): hidden_size=128
#   中等数据集(toys, sports): hidden_size=128
#   大数据集(yelp): hidden_size=256 (可选，显存充足时)
max_len: 50  # 序列最大长度
hidden_size: 128  # 模型隐藏层大小（yelp可尝试256）
dropout: 0.1  # 表示层的dropout率
emb_dropout: 0.3  # 物品嵌入层的dropout率
hidden_act: gelu  # 激活函数: gelu 或 relu
dif_blocks: 2  # 去噪解码器块的数量
dif_decoder: att  # 去噪解码器选择: 'att' 或 'mlp'
is_causal: true  # 是否使用因果注意力
model: adrec  # 模型名称: 'diffurec', 'adrec'

# ==================== Transformer 改进参数 ====================
use_rope: false  # 是否在Transformer中使用RoPE

# ==================== 位置感知扩散参数 (高级) ====================
use_position_aware: true  # 是否启用高级位置感知模块
position_importance_mode: 'hybrid'  # 位置重要性模式: 'hybrid', 'learned', 'position_based'
use_error_guided_importance: true  # 是否使用预测误差来指导重要性学习
importance_supervision_weight: 0.08  # 重要性监督损失的权重
scheduler_temperature: 1.5  # 自适应时间步调度器的温度系数
importance_entropy_weight: 0.005 # 重要性分布熵损失的权重，鼓励多样性
last_importance_weight: 0.002 # 对序列最后一个位置重要性的额外加权

# ==================== 训练超参数 ====================
# 根据数据集规模调整batch_size：
#   小数据集(ml-100k, baby, beauty): batch_size=512
#   中等数据集(toys, sports): batch_size=512
#   大数据集(yelp): batch_size=1024 (显存充足时，否则保持512)
batch_size: 512  # 批次大小（yelp可尝试1024，显存不足可降至256）
epochs: 500  # 训练轮数
optimizer: Adam  # 优化器选择: 'SGD' 或 'Adam'
lr: 0.001  # 学习率
weight_decay: 0.00001  # L2正则化系数
momentum: null  # SGD动量参数（不使用则为None）
decay_step: 100  # StepLR学习率衰减步数
gamma: 0.1  # StepLR学习率衰减系数
loss: mse  # 损失函数: 'ce', 'mse'
loss_scale: 1.0  # 损失缩放因子
pcgrad: true  # 是否使用PCGrad梯度处理（建议开启，改进版使用true）
pref_loss_scale: 1.8  # PreferDiff风格排序损失的缩放因子（Phase 2 改进）


